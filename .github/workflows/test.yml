name: Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # We need a PostgreSQL service for the tests to run against
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: assetuser
          POSTGRES_PASSWORD: assetpass
          POSTGRES_DB: assetdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run pytest
      env:
        # Point tests at the ephemeral Postgres container
        DATABASE_URL: postgresql://assetuser:assetpass@localhost:5432/assetdb
        # Mock API key so LangChain init doesn't fail
        GROQ_API_KEY: gsk_mockkeyforgithubactions1234567890
      run: |
        python -m pytest tests/ -v
