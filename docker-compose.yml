version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-assetuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assetpass}
      POSTGRES_DB: ${POSTGRES_DB:-assetdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assetuser} -d ${POSTGRES_DB:-assetdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://assetuser:assetpass@db:5432/assetdb
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./data:/app/data

volumes:
  postgres_data:
